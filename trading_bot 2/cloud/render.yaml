services:
  - type: web
    name: trading-bot-halal
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python cloud/start_cloud.py
    envVars:
      - key: MODE
        value: DEMO
      - key: CAPITAL
        value: "100.0"
      - key: PORT
        value: "10000"
    healthCheckPath: /health
