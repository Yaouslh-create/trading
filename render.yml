services:
  - type: web
    name: halal-trading-bot-pro
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    healthCheckInterval: 30
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: $PORT
      - key: LOG_LEVEL
        value: info
