services:
  - type: web
    name: trading-bot-halal
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python cloud/start_cloud.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.11.0"
